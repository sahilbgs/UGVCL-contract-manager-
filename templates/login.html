<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | UGVCL Portal Contract Manager</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .login-card:hover {
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.4);
            transform: translateY(-2px);
        }
        .login-title {
            color: #ffffff;
            font-weight: 700;
            font-size: 26px;
            letter-spacing: 0.5px;
        }
        .login-subtitle {
            color: #b0c4de;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-label {
            color: #e2e8f0;
            font-weight: 500;
            font-size: 14px;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #ffffff;
            padding: 12px 16px;
            transition: all 0.2s;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #00b4d8;
            box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.25);
            color: #ffffff;
        }
        .btn-login {
            background: linear-gradient(90deg, #00b4d8 0%, #0077b6 100%);
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-weight: 600;
            padding: 12px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 180, 216, 0.3);
        }
        .btn-login:hover {
            background: linear-gradient(90deg, #00c4e8 0%, #008cc6 100%);
            box-shadow: 0 6px 20px rgba(0, 180, 216, 0.5);
            transform: scale(1.02);
        }
        .logo-icon {
            background: linear-gradient(135deg, #ffb703 0%, #fb8500 100%);
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 20px rgba(251, 133, 0, 0.4);
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <div class="logo-icon">
        <i class="fas fa-bolt fa-2x text-white"></i>
    </div>
    <h2 class="login-title">UGVCL Portal</h2>
    <p class="login-subtitle">Contract Manager Login</p>

    <!-- Flash messages inside login -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category == 'danger' and 'danger' or 'success' }} alert-dismissible fade show border-0 text-sm py-2 px-3 mb-4" role="alert" style="border-radius: 10px;">
                    {{ message }}
                    <button type="button" class="btn-close py-2" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('login') }}" method="POST" class="text-start">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" name="username" class="form-control" id="username" placeholder="Enter username" required autocomplete="off">
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" name="password" class="form-control" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-login w-100 mt-2">Sign In</button>
    </form>
    
    <div class="text-center mt-4 text-xs" style="color: #6c7a89;">
        Default admin credentials: <br>
        <span class="text-warning">admin</span> / <span class="text-warning">admin123</span>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
